{% extends "base.html" %}

{% block title %}{{ form_title }}{% endblock %}

{% block content %}
<div class="row justify-content-center">
    <div class="col-12 col-lg-8">
        <div class="card border-0 shadow-sm rounded-4">
            <div class="card-body p-4 p-md-5">
                <div class="mb-4">
                    <h1 class="h3 fw-bold mb-1">{{ form_title }}</h1>
                    <p class="text-muted mb-0">Completa los datos del producto para guardarlo en MongoDB.</p>
                </div>

                <form action="{{ action_url }}" method="POST" class="row g-3">
                    <div class="col-md-6">
                        <label for="nombre" class="form-label">Nombre</label>
                        <input
                            type="text"
                            class="form-control"
                            id="nombre"
                            name="nombre"
                            placeholder="Ej. Paracetamol jarabe"
                            value="{{ product.nombre if product else '' }}"
                            required
                        >
                    </div>

                    <div class="col-md-6">
                        <label for="categoria" class="form-label">Categoría</label>
                        <input
                            type="text"
                            class="form-control"
                            id="categoria"
                            name="categoria"
                            placeholder="Ej. Medicamentos"
                            value="{{ product.categoria if product else '' }}"
                            required
                        >
                    </div>

                    <div class="col-12">
                        <label for="descripcion" class="form-label">Descripción</label>
                        <textarea
                            class="form-control"
                            id="descripcion"
                            name="descripcion"
                            rows="3"
                            placeholder="Describe el producto"
                        >{{ product.descripcion if product else '' }}</textarea>
                    </div>

                    <div class="col-md-4">
                        <label for="precio" class="form-label">Precio</label>
                        <div class="input-group">
                            <span class="input-group-text">Bs</span>
                            <input
                                type="number"
                                step="0.01"
                                min="0"
                                class="form-control"
                                id="precio"
                                name="precio"
                                placeholder="0.00"
                                value="{{ product.precio if product else '' }}"
                                required
                            >
                        </div>
                    </div>

                    <div class="col-md-4">
                        <label for="stock" class="form-label">Stock</label>
                        <input
                            type="number"
                            min="0"
                            class="form-control"
                            id="stock"
                            name="stock"
                            placeholder="0"
                            value="{{ product.stock if product else '' }}"
                            required
                        >
                    </div>

                    <div class="col-md-4">
                        <label for="imagen" class="form-label">Imagen URL</label>
                        <input
                            type="url"
                            class="form-control"
                            id="imagen"
                            name="imagen"
                            placeholder="https://..."
                            value="{{ product.imagen if product else '' }}"
                        >
                    </div>

                    <div class="col-12 d-flex justify-content-end gap-2 mt-4">
                        <a href="{{ url_for('product.get_products') }}" class="btn btn-outline-secondary">Cancelar</a>
                        <button type="submit" class="btn btn-primary">Guardar producto</button>
                    </div>
                </form>
            </div>
        </div>
    </div>
</div>
{% endblock %}
