<!DOCTYPE html>
<html>
<head>
    <title>Nuevo producto</title>
</head>
<body>

<h1>Crear producto</h1>

<form action="/products/new" method="POST">

    <input
        type="text"
        name="nombre"
        placeholder="Nombre"
    >

    <br><br>

    <textarea
        name="descripcion"
        placeholder="Descripción"
    ></textarea>

    <br><br>

    <input
        type="number"
        step="0.01"
        name="precio"
        placeholder="Precio"
    >

    <br><br>

    <input
        type="number"
        name="stock"
        placeholder="Stock"
    >

    <br><br>

    <input
        type="text"
        name="categoria"
        placeholder="Categoría"
    >

    <br><br>

    <input
        type="text"
        name="imagen"
        placeholder="URL imagen"
    >

    <br><br>

    <button type="submit">
        Guardar
    </button>

</form>

</body>
</html>
